name: SIT
options:
  bundleIdPrefix: com.xaymaca
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    PRODUCT_NAME: Ticklr
    MARKETING_VERSION: "1.5.0"
    CURRENT_PROJECT_VERSION: "16"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  Ticklr:
    type: application
    platform: iOS
    sources:
      - path: Sources/SIT
    settings:
      base:
        INFOPLIST_FILE: Sources/SIT/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.xaymaca.sit
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Sources/SIT/Resources/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - es
          - fr
          - de
          - it
          - nl
          - el
          - pl
          - ro
          - hu
          - pt
          - sv
          - cs
          - ru
          - zh-Hans
          - ja
          - ko
        ITSAppUsesNonExemptEncryption: false
        NSContactsUsageDescription: "Ticklr needs access to your contacts to help you build your personal network."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
    dependencies: []
    scheme:
      testTargets:
        - TicklrTests

  TicklrTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/SITTests
    settings:
      base:
        PRODUCT_NAME: TicklrTests
        PRODUCT_BUNDLE_IDENTIFIER: com.xaymaca.sit.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Ticklr

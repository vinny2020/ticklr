    <text x="93" y="241" font-family="sans-serif" font-size="9" font-weight="600" fill="#2563EB" text-anchor="middle">Weekly</text>
    <text x="120" y="241" font-family="sans-serif" font-size="9" fill="#757575">In 3d</text>
    <text x="70" y="257" font-family="sans-serif" font-size="10" fill="#9E9E9E">Ask about the new role</text>
    <text x="200" y="236" font-family="sans-serif" font-size="18" fill="#BDBDBD" text-anchor="middle">○</text>


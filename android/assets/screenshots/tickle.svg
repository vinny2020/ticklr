  <g clip-path="url(#and-screen-tickle)">

    <!-- Status bar -->
    <rect x="8" y="8" width="224" height="28" fill="#FAFAFA"/>
    <text x="20" y="23" font-family="sans-serif" font-size="9" fill="#1C1C1C">9:41</text>
    <text x="196" y="23" font-family="sans-serif" font-size="9" fill="#1C1C1C">▌▌▌ 🔋</text>

    <!-- Top app bar -->
    <rect x="8" y="36" width="224" height="52" fill="#FAFAFA"/>
    <text x="20" y="71" font-family="sans-serif" font-size="22" font-weight="700" fill="#0A1628">Tickle</text>
    <circle cx="210" cy="60" r="14" fill="#2563EB"/>
    <text x="210" y="65" font-family="sans-serif" font-size="18" fill="#FFF" text-anchor="middle">+</text>

    <!-- DUE section header -->
    <text x="18" y="106" font-family="sans-serif" font-size="11" font-weight="700" fill="#F5C842">⏰  DUE</text>

    <!-- Due card -->
    <rect x="16" y="112" width="208" height="64" rx="12" fill="#FFF" filter="url(#shadow)"/>

name: Android Release

on:
  push:
    tags:
      - 'android/v*'

jobs:
  build-and-publish:
    name: Build & Publish to Play Store
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Parse version and track from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#android/v}"

          # Default to 'internal' track
          if [[ "$VERSION" == *"-production" ]]; then
            TRACK="production"
            VERSION_NAME="${VERSION%-production}"
          elif [[ "$VERSION" == *"-alpha" ]]; then
            TRACK="alpha"
            VERSION_NAME="${VERSION%-alpha}"
          elif [[ "$VERSION" == *"-beta" ]]; then
            TRACK="beta"
            VERSION_NAME="${VERSION%-beta}"
          else
            TRACK="internal"
            VERSION_NAME="$VERSION"
          fi

          # SAFE INTEGER VERSION CODE
          # Current highest in Play Store is 25. 
          # 100 + GITHUB_RUN_NUMBER will start at 101, 102...
          # This is a safe 32-bit integer.
          VCODE=$((100 + GITHUB_RUN_NUMBER))

          echo "track=$TRACK"           >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VCODE" >> $GITHUB_OUTPUT
          echo "▸ Version: $VERSION_NAME | Track: $TRACK | Code: $VCODE"

      - name: Validate checked-in release notes
        # Release notes are sourced from checked-in files:
        # android/app/src/main/play/release-notes/<locale>/<track>.txt
        # Tags select the version and track only; tag annotations are ignored.
        run: |
          TRACK="${{ steps.version.outputs.track }}"
          shopt -s nullglob
          FILES=(android/app/src/main/play/release-notes/*/"$TRACK".txt)

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "▸ No checked-in release notes found for track '$TRACK'."
            exit 0
          fi

          for FILE in "${FILES[@]}"; do
            # Google Play caps release notes at 500 CHARACTERS per locale (not bytes).
            # Count characters in a UTF-8 locale so non-Latin scripts (Hindi, Arabic,
            # Hebrew, ...) — where one char is several bytes — aren't falsely rejected.
            CHARS=$(LC_ALL=C.UTF-8 wc -m < "$FILE" | tr -d ' ')
            echo "▸ $FILE ($CHARS chars)"
            # Fail before uploading so we do not publish an invalid release edit.
            if [ "$CHARS" -gt 500 ]; then
              echo "::error::$FILE exceeds Play's 500-character release notes limit ($CHARS chars)."
              exit 1
            fi
            echo "─── preview: $FILE ───"
            cat "$FILE"
            echo "─── end ───"
          done

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Write Play Store service account
        run: |
          echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > android/app/play-service-account.json

      - name: Write Google Services JSON
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build & publish AAB
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew publishReleaseBundle \
            -PplayTrack=${{ steps.version.outputs.track }} \
            -PversionName=${{ steps.version.outputs.version_name }} \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Clean up secrets
        if: always()
        run: |
          rm -f android/app/release.keystore
          rm -f android/app/play-service-account.json
          rm -f android/app/google-services.json

      - name: Summary
        run: |
          echo "### ✅ Android build shipped" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build (versionCode):** ${{ steps.version.outputs.version_code }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Track:** ${{ steps.version.outputs.track }}" >> $GITHUB_STEP_SUMMARY

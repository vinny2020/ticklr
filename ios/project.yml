name: SIT
options:
  bundleIdPrefix: com.xaymaca
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

# SwiftUI view-tree introspection for SwiftUI unit tests. Test-only — scoped
# below to TicklrTests, NOT the Ticklr app target. Must not appear in the
# shipped .ipa per ios/CLAUDE.md.
packages:
  ViewInspector:
    url: https://github.com/nalexn/ViewInspector
    from: "0.10.0"

settings:
  base:
    PRODUCT_NAME: Ticklr
    MARKETING_VERSION: "1.11.1"
    CURRENT_PROJECT_VERSION: "18"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  Ticklr:
    type: application
    platform: iOS
    sources:
      - path: Sources/SIT
    settings:
      base:
        INFOPLIST_FILE: Sources/SIT/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.xaymaca.sit
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: Sources/SIT/Resources/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - es
          - fr
          - de
          - it
          - nl
          - el
          - pl
          - ro
          - hu
          - pt
          - sv
          - cs
          - ru
          - zh-Hans
          - ja
          - ko
          - hi
          - ar
          - he
          - ur
        ITSAppUsesNonExemptEncryption: false
        NSContactsUsageDescription: "Ticklr needs access to your contacts to help you build your personal network."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIAppFonts:
          - BebasNeue-Regular.ttf
          - NotoNaskhArabic-SemiBold.ttf
          - NotoSerifDevanagari-SemiBold.ttf
          - NotoSerifJP-SemiBold.ttf
    dependencies: []
    scheme:
      testTargets:
        - TicklrTests
        - TicklrUITests

  TicklrUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/SITUITests
    settings:
      base:
        PRODUCT_NAME: TicklrUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.xaymaca.sit.uitests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Ticklr

  TicklrTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/SITTests
    settings:
      base:
        PRODUCT_NAME: TicklrTests
        PRODUCT_BUNDLE_IDENTIFIER: com.xaymaca.sit.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Ticklr
      - package: ViewInspector

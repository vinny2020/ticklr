    <text x="96" y="153" font-family="sans-serif" font-size="9" font-weight="600" fill="#F5C842" text-anchor="middle">Monthly</text>
    <text x="126" y="153" font-family="sans-serif" font-size="9" fill="#F5C842">Today</text>
    <text x="200" y="149" font-family="sans-serif" font-size="20" fill="#F5C842" text-anchor="middle">✓</text>

    <!-- UPCOMING section header -->
    <text x="18" y="194" font-family="sans-serif" font-size="11" font-weight="700" fill="#757575">UPCOMING</text>


name: Android Release

on:
  push:
    tags:
      - 'android/v*'

jobs:
  build-and-publish:
    name: Build & Publish to Play Store
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Needed so `git for-each-ref refs/tags/<tag>` can read the tag's
          # annotation message. Without this the tag object isn't fetched.
          fetch-tags: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Parse version and track from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#android/v}"

          # Default to 'internal' track
          if [[ "$VERSION" == *"-production" ]]; then
            TRACK="production"
            VERSION_NAME="${VERSION%-production}"
          elif [[ "$VERSION" == *"-alpha" ]]; then
            TRACK="alpha"
            VERSION_NAME="${VERSION%-alpha}"
          elif [[ "$VERSION" == *"-beta" ]]; then
            TRACK="beta"
            VERSION_NAME="${VERSION%-beta}"
          else
            TRACK="internal"
            VERSION_NAME="$VERSION"
          fi

          # SAFE INTEGER VERSION CODE
          # Current highest in Play Store is 25. 
          # 100 + GITHUB_RUN_NUMBER will start at 101, 102...
          # This is a safe 32-bit integer.
          VCODE=$((100 + GITHUB_RUN_NUMBER))

          echo "track=$TRACK"           >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VCODE" >> $GITHUB_OUTPUT
          echo "▸ Version: $VERSION_NAME | Track: $TRACK | Code: $VCODE"

      - name: Write release notes from tag annotation
        # Annotated tags (`git tag -a android/vX.Y.Z -m "..."`) carry a message;
        # we extract it and overwrite app/src/main/play/release-notes/en-US/<track>.txt
        # so the Triplet play-publisher uploads the per-release notes the tagger
        # wrote, instead of the static file checked into the repo.
        #
        # Lightweight tags (no -m / no -a) leave the existing file untouched.
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES=$(git for-each-ref --format='%(contents)' "refs/tags/$TAG")
          NOTES_TRIMMED=$(printf '%s' "$NOTES" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

          if [ -z "$NOTES_TRIMMED" ]; then
            echo "▸ Tag '$TAG' has no annotation; falling back to checked-in release-notes file."
            exit 0
          fi

          TRACK="${{ steps.version.outputs.track }}"
          DEST_DIR="android/app/src/main/play/release-notes/en-US"
          DEST_FILE="$DEST_DIR/${TRACK}.txt"
          mkdir -p "$DEST_DIR"
          printf '%s\n' "$NOTES_TRIMMED" > "$DEST_FILE"

          BYTES=$(wc -c < "$DEST_FILE")
          echo "▸ Wrote $BYTES bytes to $DEST_FILE"
          # Google Play caps release notes at 500 chars per locale per release.
          # Don't truncate — let publishReleaseBundle fail loudly so the tagger
          # knows to shorten the message and re-tag, rather than silently
          # publishing a half-sentence.
          if [ "$BYTES" -gt 500 ]; then
            echo "::warning::Release notes exceed Play's 500-char limit ($BYTES bytes). publishReleaseBundle will likely reject this — re-tag with a shorter message."
          fi
          echo "─── preview ───"
          cat "$DEST_FILE"
          echo "─── end ───"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Write Play Store service account
        run: |
          echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > android/app/play-service-account.json

      - name: Write Google Services JSON
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build & publish AAB
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew publishReleaseBundle \
            -PplayTrack=${{ steps.version.outputs.track }} \
            -PversionName=${{ steps.version.outputs.version_name }} \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Clean up secrets
        if: always()
        run: |
          rm -f android/app/release.keystore
          rm -f android/app/play-service-account.json
          rm -f android/app/google-services.json

      - name: Summary
        run: |
          echo "### ✅ Android build shipped" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build (versionCode):** ${{ steps.version.outputs.version_code }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Track:** ${{ steps.version.outputs.track }}" >> $GITHUB_STEP_SUMMARY

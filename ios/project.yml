name: SIT
options:
  bundleIdPrefix: com.xaymaca
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    PRODUCT_NAME: SIT
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  SIT:
    type: application
    platform: iOS
    sources:
      - path: Sources/SIT
    settings:
      base:
        INFOPLIST_FILE: Sources/SIT/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.xaymaca.sit
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/SIT/Resources/Info.plist
      properties:
        NSContactsUsageDescription: "SIT needs access to your contacts to help you build your personal network."
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
    dependencies: []
    scheme:
      testTargets: []

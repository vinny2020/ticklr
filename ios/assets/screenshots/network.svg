<svg width="240" height="500" viewBox="0 0 240 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="screen-network">
      <rect x="8" y="8" width="224" height="484" rx="36"/>
    </clipPath>
  </defs>

  <!-- Phone frame -->
  <rect x="2" y="2" width="236" height="496" rx="40" fill="#1C1C1E" stroke="#3A3A3C" stroke-width="2"/>
  <rect x="8" y="8" width="224" height="484" rx="36" fill="#F2F2F7"/>

  <!-- Dynamic island -->
  <rect x="88" y="18" width="64" height="14" rx="7" fill="#1C1C1E"/>

  <!-- Clipped content -->
  <g clip-path="url(#screen-network)">

    <!-- Nav bar -->
    <rect x="8" y="8" width="224" height="88" fill="#F2F2F7"/>
    <text x="24" y="82" font-family="-apple-system, sans-serif" font-size="28" font-weight="700" fill="#000">Network</text>
    <text x="196" y="80" font-family="-apple-system, sans-serif" font-size="22" fill="#5856D6">+</text>

    <!-- Search bar -->
    <rect x="16" y="96" width="208" height="34" rx="10" fill="#E5E5EA"/>
    <text x="72" y="118" font-family="-apple-system, sans-serif" font-size="13" fill="#8E8E93">Search your network</text>
    <text x="28" y="119" font-family="-apple-system, sans-serif" font-size="14" fill="#8E8E93">🔍</text>

    <!-- Divider -->
    <line x1="16" y1="138" x2="224" y2="138" stroke="#C6C6C8" stroke-width="0.5"/>

    <!-- Contact row 1 -->
    <circle cx="46" cy="162" r="18" fill="#EEF0FF"/>
    <text x="46" y="167" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#5856D6" text-anchor="middle">AJ</text>
    <text x="74" y="157" font-family="-apple-system, sans-serif" font-size="14" font-weight="500" fill="#000">Alex Johnson</text>
    <text x="74" y="172" font-family="-apple-system, sans-serif" font-size="11" fill="#8E8E93">Acme Corp</text>
    <text x="206" y="165" font-family="-apple-system, sans-serif" font-size="9" fill="#C7C7CC">✏</text>
    <line x1="66" y1="182" x2="224" y2="182" stroke="#E5E5EA" stroke-width="0.5"/>

    <!-- Contact row 2 -->
    <circle cx="46" cy="204" r="18" fill="#EEF0FF"/>
    <text x="46" y="209" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#5856D6" text-anchor="middle">SR</text>
    <text x="74" y="199" font-family="-apple-system, sans-serif" font-size="14" font-weight="500" fill="#000">Sarah Rivera</text>
    <text x="74" y="214" font-family="-apple-system, sans-serif" font-size="11" fill="#8E8E93">Freelance</text>
    <text x="204" y="207" font-family="-apple-system, sans-serif" font-size="9" fill="#C7C7CC">in</text>
    <line x1="66" y1="224" x2="224" y2="224" stroke="#E5E5EA" stroke-width="0.5"/>

    <!-- Contact row 3 -->
    <circle cx="46" cy="246" r="18" fill="#EEF0FF"/>
    <text x="46" y="251" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#5856D6" text-anchor="middle">MT</text>
    <text x="74" y="241" font-family="-apple-system, sans-serif" font-size="14" font-weight="500" fill="#000">Marcus Torres</text>
    <text x="74" y="256" font-family="-apple-system, sans-serif" font-size="11" fill="#8E8E93">Stripe</text>
    <line x1="66" y1="266" x2="224" y2="266" stroke="#E5E5EA" stroke-width="0.5"/>

    <!-- Contact row 4 -->
    <circle cx="46" cy="288" r="18" fill="#EEF0FF"/>
    <text x="46" y="293" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#5856D6" text-anchor="middle">PW</text>
    <text x="74" y="283" font-family="-apple-system, sans-serif" font-size="14" font-weight="500" fill="#000">Priya Wang</text>
    <text x="74" y="298" font-family="-apple-system, sans-serif" font-size="11" fill="#8E8E93">Google</text>
    <text x="200" y="291" font-family="-apple-system, sans-serif" font-size="9" fill="#C7C7CC">📱</text>
    <line x1="66" y1="308" x2="224" y2="308" stroke="#E5E5EA" stroke-width="0.5"/>

    <!-- Contact row 5 -->
    <circle cx="46" cy="330" r="18" fill="#EEF0FF"/>
    <text x="46" y="335" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#5856D6" text-anchor="middle">JK</text>
    <text x="74" y="325" font-family="-apple-system, sans-serif" font-size="14" font-weight="500" fill="#000">James Kim</text>
    <text x="74" y="340" font-family="-apple-system, sans-serif" font-size="11" fill="#8E8E93">Consultant</text>
    <line x1="66" y1="350" x2="224" y2="350" stroke="#E5E5EA" stroke-width="0.5"/>

  </g>

  <!-- Tab bar -->
  <rect x="8" y="444" width="224" height="48" rx="0" fill="#F2F2F7"/>
  <line x1="8" y1="444" x2="232" y2="444" stroke="#C6C6C8" stroke-width="0.5"/>
  <text x="30" y="462" font-family="-apple-system, sans-serif" font-size="16" fill="#5856D6" text-anchor="middle">👥</text>
  <text x="30" y="473" font-family="-apple-system, sans-serif" font-size="8" fill="#5856D6" text-anchor="middle">Network</text>
  <text x="90" y="462" font-family="-apple-system, sans-serif" font-size="16" fill="#8E8E93" text-anchor="middle">🔔</text>
  <text x="90" y="473" font-family="-apple-system, sans-serif" font-size="8" fill="#8E8E93" text-anchor="middle">Tickle</text>
  <text x="150" y="462" font-family="-apple-system, sans-serif" font-size="16" fill="#8E8E93" text-anchor="middle">✉️</text>
  <text x="150" y="473" font-family="-apple-system, sans-serif" font-size="8" fill="#8E8E93" text-anchor="middle">Compose</text>
  <text x="210" y="462" font-family="-apple-system, sans-serif" font-size="16" fill="#8E8E93" text-anchor="middle">⚙️</text>
  <text x="210" y="473" font-family="-apple-system, sans-serif" font-size="8" fill="#8E8E93" text-anchor="middle">Settings</text>

  <!-- Home indicator -->
  <rect x="88" y="488" width="64" height="4" rx="2" fill="#3A3A3C" opacity="0.3"/>
</svg>

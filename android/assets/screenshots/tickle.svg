    <rect x="16" y="200" width="208" height="64" rx="12" fill="#FFF"/>
    <circle cx="44" cy="232" r="16" fill="#DBEAFE"/>
    <text x="44" y="237" font-family="sans-serif" font-size="12" font-weight="600" fill="#2563EB" text-anchor="middle">AJ</text>
    <text x="70" y="226" font-family="sans-serif" font-size="13" font-weight="500" fill="#0A1628">Alex Johnson</text>

<svg width="240" height="500" viewBox="0 0 240 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="and-screen-compose">
      <rect x="8" y="8" width="224" height="484" rx="20"/>
    </clipPath>
  </defs>

  <!-- Phone frame -->
  <rect x="2" y="2" width="236" height="496" rx="24" fill="#1A1A1A" stroke="#2E2E2E" stroke-width="2"/>
  <rect x="8" y="8" width="224" height="484" rx="20" fill="#FAFAFA"/>

  <!-- Punch-hole camera -->
  <circle cx="120" cy="22" r="5" fill="#1A1A1A"/>

  <g clip-path="url(#and-screen-compose)">

    <!-- Status bar -->
    <rect x="8" y="8" width="224" height="28" fill="#FAFAFA"/>
    <text x="20" y="23" font-family="sans-serif" font-size="9" fill="#1C1C1C">9:41</text>
    <text x="196" y="23" font-family="sans-serif" font-size="9" fill="#1C1C1C">▌▌▌ 🔋</text>

    <!-- Top app bar -->
    <rect x="8" y="36" width="224" height="52" fill="#FAFAFA"/>
    <text x="20" y="71" font-family="sans-serif" font-size="22" font-weight="700" fill="#0A1628">Compose</text>
    <!-- Send FAB-style button -->
    <rect x="156" y="48" width="66" height="28" rx="14" fill="#2563EB"/>
    <text x="189" y="66" font-family="sans-serif" font-size="10" font-weight="600" fill="#FFF" text-anchor="middle">Send 2 ✈</text>

    <!-- Recipients label -->
    <text x="18" y="104" font-family="sans-serif" font-size="11" font-weight="700" fill="#757575">RECIPIENTS</text>

    <!-- Contact row 1 — selected -->
    <rect x="16" y="110" width="208" height="48" rx="0" fill="#FFF"/>
    <circle cx="40" cy="134" r="14" fill="#DBEAFE"/>
    <text x="40" y="139" font-family="sans-serif" font-size="11" font-weight="600" fill="#2563EB" text-anchor="middle">AJ</text>
    <text x="62" y="130" font-family="sans-serif" font-size="13" font-weight="500" fill="#0A1628">Alex Johnson</text>
    <text x="62" y="144" font-family="sans-serif" font-size="10" fill="#757575">Acme Corp</text>
    <circle cx="204" cy="134" r="10" fill="#2563EB"/>
    <text x="204" y="138" font-family="sans-serif" font-size="11" fill="#FFF" text-anchor="middle">✓</text>
    <line x1="54" y1="158" x2="224" y2="158" stroke="#EEEEEE" stroke-width="0.5"/>

    <!-- Contact row 2 — selected -->
    <rect x="16" y="158" width="208" height="48" rx="0" fill="#FFF"/>
    <circle cx="40" cy="182" r="14" fill="#DBEAFE"/>
    <text x="40" y="187" font-family="sans-serif" font-size="11" font-weight="600" fill="#2563EB" text-anchor="middle">SR</text>
    <text x="62" y="178" font-family="sans-serif" font-size="13" font-weight="500" fill="#0A1628">Sarah Rivera</text>
    <text x="62" y="192" font-family="sans-serif" font-size="10" fill="#757575">Freelance</text>
    <circle cx="204" cy="182" r="10" fill="#2563EB"/>
    <text x="204" y="186" font-family="sans-serif" font-size="11" fill="#FFF" text-anchor="middle">✓</text>
    <line x1="54" y1="206" x2="224" y2="206" stroke="#EEEEEE" stroke-width="0.5"/>

    <!-- Contact row 3 — unselected -->
    <rect x="16" y="206" width="208" height="48" rx="0" fill="#FFF"/>
    <circle cx="40" cy="230" r="14" fill="#DBEAFE"/>
    <text x="40" y="235" font-family="sans-serif" font-size="11" font-weight="600" fill="#2563EB" text-anchor="middle">MT</text>
    <text x="62" y="226" font-family="sans-serif" font-size="13" font-weight="500" fill="#0A1628">Marcus Torres</text>
    <text x="62" y="240" font-family="sans-serif" font-size="10" fill="#757575">Stripe</text>
    <line x1="54" y1="254" x2="224" y2="254" stroke="#EEEEEE" stroke-width="0.5"/>

    <!-- Message label -->
    <text x="18" y="272" font-family="sans-serif" font-size="11" font-weight="700" fill="#757575">MESSAGE</text>

    <!-- Message card -->
    <rect x="16" y="278" width="208" height="110" rx="12" fill="#FFF"/>
    <!-- Template row -->
    <text x="28" y="298" font-family="sans-serif" font-size="12" fill="#757575">Template</text>
    <text x="154" y="298" font-family="sans-serif" font-size="12" fill="#2563EB">Catch-up ›</text>
    <line x1="28" y1="306" x2="208" y2="306" stroke="#EEEEEE" stroke-width="0.5"/>
    <!-- Message body -->
    <text x="28" y="324" font-family="sans-serif" font-size="11" fill="#212121">Hey, just thinking of you —</text>
    <text x="28" y="338" font-family="sans-serif" font-size="11" fill="#212121">hope things are going well!</text>
    <text x="28" y="352" font-family="sans-serif" font-size="11" fill="#212121">Let's catch up soon.</text>
    <!-- Cursor -->
    <rect x="28" y="360" width="1.5" height="12" rx="1" fill="#2563EB"/>

    <!-- Direct send note (Android advantage) -->
    <rect x="16" y="398" width="208" height="30" rx="8" fill="#EFF6FF"/>
    <text x="28" y="413" font-family="sans-serif" font-size="10" fill="#2563EB">⚡ Send directly via SMS (no app needed)</text>

  </g>

  <!-- Bottom nav bar -->
  <rect x="8" y="440" width="224" height="52" fill="#FAFAFA"/>
  <line x1="8" y1="440" x2="232" y2="440" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="30" y="459" font-family="sans-serif" font-size="16" fill="#9E9E9E" text-anchor="middle">👥</text>
  <text x="30" y="470" font-family="sans-serif" font-size="7" fill="#9E9E9E" text-anchor="middle">Network</text>
  <text x="90" y="459" font-family="sans-serif" font-size="16" fill="#9E9E9E" text-anchor="middle">🔔</text>
  <text x="90" y="470" font-family="sans-serif" font-size="7" fill="#9E9E9E" text-anchor="middle">Tickle</text>
  <text x="150" y="459" font-family="sans-serif" font-size="16" fill="#2563EB" text-anchor="middle">✉️</text>
  <text x="150" y="470" font-family="sans-serif" font-size="7" fill="#2563EB" text-anchor="middle">Compose</text>
  <text x="210" y="459" font-family="sans-serif" font-size="16" fill="#9E9E9E" text-anchor="middle">⚙️</text>
  <text x="210" y="470" font-family="sans-serif" font-size="7" fill="#9E9E9E" text-anchor="middle">Settings</text>

  <!-- Gesture bar -->
  <rect x="88" y="486" width="64" height="3" rx="2" fill="#BDBDBD"/>
</svg>

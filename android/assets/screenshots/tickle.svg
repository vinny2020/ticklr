    <circle cx="44" cy="302" r="16" fill="#DBEAFE"/>
    <text x="44" y="307" font-family="sans-serif" font-size="12" font-weight="600" fill="#2563EB" text-anchor="middle">MT</text>
    <text x="70" y="296" font-family="sans-serif" font-size="13" font-weight="500" fill="#0A1628">Marcus Torres</text>
    <rect x="70" y="301" width="54" height="13" rx="6" fill="#EFF6FF"/>
    <text x="97" y="311" font-family="sans-serif" font-size="9" font-weight="600" fill="#2563EB" text-anchor="middle">Quarterly</text>
    <text x="128" y="311" font-family="sans-serif" font-size="9" fill="#757575">In 18d</text>
    <text x="200" y="306" font-family="sans-serif" font-size="18" fill="#BDBDBD" text-anchor="middle">○</text>

    <!-- SNOOZED section -->
    <text x="18" y="350" font-family="sans-serif" font-size="11" font-weight="700" fill="#757575">SNOOZED</text>
    <rect x="16" y="356" width="208" height="52" rx="12" fill="#FFF" opacity="0.5"/>
    <circle cx="44" cy="382" r="16" fill="#DBEAFE" opacity="0.5"/>
    <text x="44" y="387" font-family="sans-serif" font-size="12" font-weight="600" fill="#2563EB" text-anchor="middle" opacity="0.5">PW</text>
    <text x="70" y="378" font-family="sans-serif" font-size="13" font-weight="500" fill="#0A1628" opacity="0.5">Priya Wang</text>
    <text x="70" y="394" font-family="sans-serif" font-size="9" fill="#9E9E9E" opacity="0.5">Snoozed · In 5d</text>

  </g>

  <!-- Bottom nav bar -->
  <rect x="8" y="440" width="224" height="52" fill="#FAFAFA"/>
  <line x1="8" y1="440" x2="232" y2="440" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="30" y="459" font-family="sans-serif" font-size="16" fill="#9E9E9E" text-anchor="middle">👥</text>
  <text x="30" y="470" font-family="sans-serif" font-size="7" fill="#9E9E9E" text-anchor="middle">Network</text>
  <text x="90" y="459" font-family="sans-serif" font-size="16" fill="#2563EB" text-anchor="middle">🔔</text>
  <text x="90" y="470" font-family="sans-serif" font-size="7" fill="#2563EB" text-anchor="middle">Tickle</text>
  <text x="150" y="459" font-family="sans-serif" font-size="16" fill="#9E9E9E" text-anchor="middle">✉️</text>
  <text x="150" y="470" font-family="sans-serif" font-size="7" fill="#9E9E9E" text-anchor="middle">Compose</text>
  <text x="210" y="459" font-family="sans-serif" font-size="16" fill="#9E9E9E" text-anchor="middle">⚙️</text>
  <text x="210" y="470" font-family="sans-serif" font-size="7" fill="#9E9E9E" text-anchor="middle">Settings</text>

  <!-- Gesture bar -->
